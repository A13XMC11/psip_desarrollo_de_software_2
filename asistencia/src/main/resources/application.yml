spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/attendance_db}
    username: ${DB_USER:root}
    password: ${DB_PASS:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: false
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USER:}
    password: ${MAIL_PASS:}
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

app:
  token:
    expiration-minutes: ${TOKEN_EXPIRATION_MINUTES:5}
  security:
    max-login-attempts: 5
    lockout-minutes: 15
  base-url: ${APP_BASE_URL:http://localhost:8080}

server:
  port: 8080
